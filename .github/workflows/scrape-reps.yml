name: Scrape Rep Data

on:
  schedule:
    # Weekly Monday 10am ET (UTC-5 = 15:00 UTC)
    - cron: '0 15 * * 1'
    # Monthly 1st at 10am ET
    - cron: '0 15 1 * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which jobs to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - state-only
          - local-only
          - boundaries-only

jobs:
  update-state-legislators:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'state-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m scripts.scrape_reps --state-only
      - run: python scripts/validate-data.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet src/data/state-legislators.json || (git add src/data/state-legislators.json && git commit -m "chore: update state legislator data" && git push)

  scrape-local-councils:
    if: >-
      github.event.schedule == '0 15 1 * *' ||
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'local-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m scripts.scrape_reps --local-only
      - run: python scripts/validate-data.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet src/data/local-councils.json || (git add src/data/local-councils.json && git commit -m "chore: update local council data" && git push)

  build-boundaries:
    if: >-
      github.event.schedule == '0 15 1 * *' ||
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'boundaries-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/build-districts.py
      - run: python scripts/validate-data.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet public/districts/ || (git add public/districts/ && git commit -m "chore: update district boundaries" && git push)
