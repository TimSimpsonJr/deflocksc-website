name: Scrape Rep Data

# State legislator data now comes from the open-civics npm package
# (updated via Dependabot). This workflow only handles local councils
# and district boundaries until those are also available in open-civics.

on:
  schedule:
    # Monthly 1st at 10am ET
    - cron: '0 15 1 * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which jobs to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - local-only
          - boundaries-only

jobs:
  scrape-local-councils:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'local-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m scripts.scrape_reps --local-only
      - run: python scripts/validate-data.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet src/data/local-councils.json || (git add src/data/local-councils.json && git commit -m "chore: update local council data" && git push)

  build-boundaries:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'boundaries-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/build-districts.py
      - run: python scripts/validate-data.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet public/districts/ || (git add public/districts/ && git commit -m "chore: update district boundaries" && git push)
